<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laba Muno Movies</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#0f172a;
}

.logo{
  color:#ff1e1e;
  font-weight:bold;
  font-size:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:10px;
  padding:15px;
}

.card{
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card h4{
  padding:5px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Laba Muno</div>
</div>

<h2 style="padding:10px;">🎬 Latest Movies</h2>

<div class="grid" id="grid"></div>

<script>
const sb = supabase.createClient(
  "https://cudtubtaggumkdrpkvjy.supabase.co",
  "sb_publishable_OJ0ZM1PnbEzHibVntQQVQA_QY48y-_B"
);

async function load(){

  let { data } = await sb.from("videos").select("*");

  let grid = document.getElementById("grid");

  data.forEach(v=>{
    grid.innerHTML += `
      <div class="card">
        <img src="${v.thumbnail_url}">
        <h4>${v.title}</h4>
      </div>
    `;
  });
}

load();
</script>

</body>
</html>
