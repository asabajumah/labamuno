<!DOCTYPE html>
<html>
<head>
<title>Laba Muno Movies</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial;}
header{display:flex;justify-content:space-between;padding:15px;background:#0f172a;position:fixed;width:100%;top:0;}
.logo{color:red;font-weight:bold;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;padding:80px 10px;}
.card{background:#1e293b;border-radius:10px;overflow:hidden;cursor:pointer;}
.card img{width:100%;height:120px;object-fit:cover;}
.card p{padding:5px;}
</style>
</head>

<body>

<header>
  <div class="logo">Laba Muno</div>
  <div>
    <a href="login.html" style="color:white">Login</a>
    <a href="admin.html" style="color:white;margin-left:10px">Admin</a>
  </div>
</header>

<div class="grid" id="grid"></div>

<script>
const sb = supabase.createClient(
  "https://cudtubtaggumkdrpkvjy.supabase.co",
  "sb_publishable_OJ0ZM1PnbEzHibVntQQVQA_QY48y-_B"
);

let user=null;

async function check(){
  const { data } = await sb.auth.getUser();
  user = data.user;
}
check();

async function load(){
  let { data } = await sb.from("videos").select("*");

  let grid = document.getElementById("grid");

  data.forEach(v=>{
    grid.innerHTML += `
      <div class="card" onclick="openMovie('${v.id}',${v.premium})">
        <img src="${v.thumbnail_url}">
        <p>${v.title}</p>
      </div>
    `;
  });
}

function openMovie(id,premium){
  if(premium && !user){
    window.location.href="login.html";
    return;
  }
  window.location.href="movie.html?id="+id;
}

load();
</script>

</body>
</html>
