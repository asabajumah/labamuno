<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Laba Muno Movies</title>

<meta name="description" content="Laba Muno is an online streaming platform to watch Luganda translated movies, series and live TV.">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020617;
  color:white;
  padding-top:70px;
}

/* HEADER */
.topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;

  display:flex;
  align-items:center;
  justify-content:space-between;

  padding:12px 20px;
  background:#0f172a;
  border-bottom:1px solid #1e293b;
}

.logo{
  font-size:24px;
  font-weight:bold;
  color:#ff1e1e;
  text-transform:uppercase;
}

/* SEARCH */
.search{
  width:220px;
  padding:8px;
  border:none;
  border-radius:6px;
  background:#1e293b;
  color:white;
}

/* HERO */
.hero{
  height:160px;
  background:#111827;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{color:#38bdf8;margin:0;}
.hero p{color:#cbd5e1;}

/* ROW */
.section{
  padding:10px;
}

.section h2{
  color:#38bdf8;
}

.row{
  display:flex;
  overflow-x:auto;
  gap:10px;
}

/* CARD */
.card{
  min-width:200px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  opacity:0.85;
  transition:0.2s;
}

.card:hover{
  opacity:1;
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card h3{
  font-size:14px;
  padding:5px;
  color:#38bdf8;
}

/* LOGIN MODAL */
.auth-box{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:#020617;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:10px;
  z-index:9999;
}

.auth-box input{
  padding:10px;
  width:250px;
  border:none;
  border-radius:6px;
}

.auth-box button{
  padding:10px 20px;
  background:#ff1e1e;
  color:white;
  border:none;
  border-radius:6px;
}

#msg{
  color:#38bdf8;
}

/* VIDEO MODAL */
.video-box{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:9999;
}

video{
  width:90%;
  max-width:800px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="authBox" class="auth-box">
  <h2>Login Required</h2>

  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signUp()">Sign Up</button>

  <p id="msg"></p>
</div>

<!-- VIDEO PLAYER -->
<div id="videoBox" class="video-box">
  <video id="player" controls></video>
  <br>
  <button onclick="closeVideo()">Close</button>
</div>

<!-- HEADER -->
<header class="topbar">
  <div class="logo">Laba Muno</div>
  <input id="searchInput" class="search" onkeyup="searchVideos()" placeholder="Search...">
</header>

<!-- HERO -->
<div class="hero">
  <h1>Welcome to Laba Muno Movies</h1>
  <p>Click any movie to watch (login required)</p>
</div>

<!-- MOVIES -->
<div class="section">
  <h2>🎬 Movies</h2>
  <div class="row" id="moviesRow"></div>
</div>

<!-- SERIES -->
<div class="section">
  <h2>📺 Series</h2>
  <div class="row" id="seriesRow"></div>
</div>

<!-- MUSIC -->
<div class="section">
  <h2>🎵 Music</h2>
  <div class="row" id="musicRow"></div>
</div>

<script>
const supabaseUrl = "https://cudtubtaggumkdrpkvjy.supabase.co";
const supabaseKey = "sb_publishable_OJ0ZM1PnbEzHibVntQQVQA_QY48y-_B";

const sb = supabase.createClient(supabaseUrl, supabaseKey);

let allVideos = [];
let currentUser = null;

/* CHECK USER */
async function checkUser(){
  const { data } = await sb.auth.getUser();
  currentUser = data.user;
}
checkUser();

/* LOGIN */
async function login(){
  let email = emailInput().value;
  let password = passInput().value;

  let { error } = await sb.auth.signInWithPassword({ email, password });

  if(error){
    msg(error.message);
  } else {
    hideLogin();
    loadData();
  }
}

/* SIGN UP */
async function signUp(){
  let email = emailInput().value;
  let password = passInput().value;

  let { error } = await sb.auth.signUp({ email, password });

  msg(error ? error.message : "Check email to confirm");
}

/* LOAD VIDEOS */
async function loadData(){

  let { data } = await sb.from("videos").select("*");

  allVideos = data;
  render(data);
}

/* RENDER */
function render(data){

  let movies = document.getElementById("moviesRow");
  let series = document.getElementById("seriesRow");
  let music  = document.getElementById("musicRow");

  movies.innerHTML = "";
  series.innerHTML = "";
  music.innerHTML = "";

  data.forEach(v => {

    let card = `
      <div class="card" onclick="openVideo('${v.video_url}')">
        <img src="${v.thumbnail_url}">
        <h3>${v.title}</h3>
      </div>
    `;

    if(v.category === "Movie") movies.innerHTML += card;
    else if(v.category === "Series") series.innerHTML += card;
    else music.innerHTML += card;

  });
}

/* CLICK PROTECTION */
async function openVideo(url){

  const { data } = await sb.auth.getUser();

  if(!data.user){
    document.getElementById("authBox").style.display = "flex";
    return;
  }

  document.getElementById("videoBox").style.display = "flex";
  document.getElementById("player").src = url;
}

function closeVideo(){
  document.getElementById("videoBox").style.display = "none";
  document.getElementById("player").pause();
}

/* SEARCH */
function searchVideos(){

  let value = document.getElementById("searchInput").value.toLowerCase();

  let filtered = allVideos.filter(v =>
    v.title.toLowerCase().includes(value)
  );

  render(filtered);
}

/* HELPERS */
function emailInput(){ return document.getElementById("email"); }
function passInput(){ return document.getElementById("password"); }
function msg(t){ document.getElementById("msg").innerText = t; }
function hideLogin(){ document.getElementById("authBox").style.display="none"; }

loadData();
</script>

</body>
</html>
