<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="background:#0b1220;color:white;font-family:Arial;">

<h1>Admin Upload</h1>

<input id="title" placeholder="Title"><br><br>
<input id="thumb" placeholder="Thumbnail"><br><br>
<input id="video" placeholder="Video URL"><br><br>

<select id="cat">
  <option>Movie</option>
  <option>Series</option>
</select><br><br>

<label>
Premium:
<input type="checkbox" id="premium">
</label><br><br>

<button onclick="upload()">Upload</button>

<script>
const sb = supabase.createClient(
  "https://cudtubtaggumkdrpkvjy.supabase.co",
  "sb_publishable_OJ0ZM1PnbEzHibVntQQVQA_QY48y-_B"
);

async function upload(){
  await sb.from("videos").insert([{
    title:title.value,
    thumbnail_url:thumb.value,
    video_url:video.value,
    category:cat.value,
    premium:premium.checked
  }]);

  alert("Uploaded!");
}
</script>

</body>
</html>
